version: "3.9"

services:
  airfair-vista:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airfair-vista
    image: airfair-vista:latest
    ports:
      - "8501:8501"
    # Mount models/ and data/ as volumes so:
    #   - Trained model persists across container restarts
    #   - You can drop a new dataset in without rebuilding
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
